spring:
  application:
    name: alba-platform

  profiles:
    active: dev  # ← 이게 있는지 확인!

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  forward-headers-strategy: framework

logging:
  level:
    com.alba.platform: DEBUG
    org.hibernate.SQL: DEBUG
