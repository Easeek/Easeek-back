spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/alba_platform?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: alba_user
    password: alba_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

jwt:
  secret: your-256-bit-secret-key-for-jwt-token-please-change-in-production-min-256-bits-long-secret
  access-token-validity: 86400000
  refresh-token-validity: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha