version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: alba-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: alba_platform
      MYSQL_USER: alba_user
      MYSQL_PASSWORD: alba_password
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - alba-network

  redis:
    image: redis:7-alpine
    container_name: alba-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - alba-network

volumes:
  mysql_data:
  redis_data:

networks:
  alba-network:
    driver: bridge